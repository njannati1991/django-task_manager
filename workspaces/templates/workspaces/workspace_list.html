{% extends 'base.html' %}
{% block title %}Workspaces{% endblock %}
{% block content %}
<h2>Your Workspaces</h2>

<a class="btn btn-primary" href="{% url 'workspace-create' %}">Create New</a>

<ul class="mt-3 list-group">
{% for workspace in workspaces %}
<li class="list-group-item"><a href="{% url 'workspace-detail' workspace.id %}">{{ workspace.name }}</a></li>
{% empty %}
<li class="list-group-item">No workspace yet.</li>
{% endfor %}
</ul>


{% endblock %}
